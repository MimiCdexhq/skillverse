services:
  - type: web
    name: skillverse-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillverse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBAPP_URL
        sync: false

  - type: worker
    name: skillverse-bot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run bot
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillverse-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: skillverse-api
          key: JWT_SECRET
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBAPP_URL
        sync: false

databases:
  - name: skillverse-db
    plan: free
    region: oregon
