<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0044;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#logoGradient)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="60" font-weight="900" fill="url(#logoGradient)" text-anchor="middle" filter="url(#glow)">SV</text>
</svg>
